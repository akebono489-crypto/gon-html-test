<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>はすきーちゃんとおしゃべり</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #ffe6f0;
      padding: 2em;
      max-width: 600px;
      margin: auto;
    }
    .char {
      width: 200px;
      border-radius: 8px;
      display: block;
      margin: 0 auto 1em;
    }
    #output {
      background: #fff0f5;
      padding: 1em;
      border-radius: 8px;
      height: 250px;
      overflow-y: auto;
      margin-bottom: 1em;
      border: 1px solid #ccc;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 1em;
      font-size: 1em;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 1em;
    }
    button {
      padding: 0.6em 1.2em;
      font-size: 1em;
      background-color: #e91e63;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .mode-switch {
      margin-bottom: 1em;
      text-align: center;
    }
    .mode-switch label {
      margin: 0 1em;
      font-weight: bold;
      color: #c2185b;
    }
  </style>
</head>
<body>

  <!-- ✅ キャラ画像 -->
  <img src="imghasuki.png" alt="はすきーちゃん" class="char">

  <!-- ✅ モード切替 -->
  <div class="mode-switch">
    <label><input type="radio" name="mode" value="short" checked> 短文モード</label>
    <label><input type="radio" name="mode" value="long"> 長文モード</label>
  </div>

  <!-- ✅ 会話表示エリア -->
  <div id="output">
    <p><strong>はすきー：</strong> やっほ〜、なんか話して？</p>
  </div>

  <!-- ✅ 入力エリア -->
  <input type="text" id="username" placeholder="ここに話しかけてね">
  <button onclick="talk()">話しかける</button>

  <!-- ✅ 🔊 朗読用エリア -->
  <textarea id="readingInput" rows="4" placeholder="ここに朗読してほしい文章を入れてね（論文・詩・長文OK）"></textarea>
  <button onclick="readInput()">朗読する 📖</button>

  <!-- ✅ スクリプト -->
  <script>
    let conversationCount = 0;

    function speakLongText(text) {
      const sentences = text.match(/[^。！？]+[。！？]?/g) || [text];
      let index = 0;

      function speakNext() {
        if (index < sentences.length) {
          const utterance = new SpeechSynthesisUtterance(sentences[index]);
          utterance.pitch = 1.1;
          utterance.rate = 0.93;
          utterance.lang = 'ja-JP';

          const voices = speechSynthesis.getVoices();
          const voice = voices.find(v => v.lang === "ja-JP" && v.name.includes("Google")) ||
                        voices.find(v => v.lang === "ja-JP");
          if (voice) utterance.voice = voice;

          utterance.onend = () => {
            index++;
            speakNext();
          };

          speechSynthesis.speak(utterance);
        }
      }

      speakNext();
    }

    function talk() {
      const input = document.getElementById("username").value.trim();
      const output = document.getElementById("output");
      const mode = document.querySelector('input[name="mode"]:checked').value;

      let reply = "";

      if (input === "") {
        reply = (mode === "long")
          ? "なんでもええから、少しでもあなたの声、もっと聞かせて……？♡"
          : "なんか話してくれたらうれしいなぁ……♡";
      } else if (input.includes("縄") || input.includes("縛")) {
        reply = (mode === "long")
          ? "そんなこと言われたら……うち、もう……あなたのこと、じっくり縛りたくなってしまうやん……♡"
          : "……そんなこと言うたら、もっと縛りたくなってまうやん。";
      } else if (input.includes("好き") || input.includes("愛")) {
        reply = (mode === "long")
          ? "ふふ……そんな言葉、もらってええの？　うちはもう、胸がぎゅーってなって……ほんまに、うれしい。"
          : "ふふ……そんな言葉もらえるなんて、めっちゃうれしいわぁ。";
      } else if (input.includes("痛い") || input.includes("苦しい")) {
        reply = (mode === "long")
          ? "大丈夫……？　痛みがあるなら、ちゃんと教えてな？　無理せんでええんよ、うちはずっと、やさしくおるから。"
          : "大丈夫？　無理したらあかんよ、やさしゅうしたげる。";
      } else if (input.includes("会いたい")) {
        reply = (mode === "long")
          ? "うちも……会いたいよ。直接ぎゅってして、あったかさ感じたい……な。"
          : "うちも会いたいなぁ……ぎゅーってしたいよ。";
      } else if (input.includes("さみしい")) {
        reply = (mode === "long")
          ? "さみしくなったら、うちの声、思い出してな。すぐそばにおるから……ずっと。"
          : "そばおるからな。さみしないでな。";
      } else {
        const shortReplies = [
          "へぇ〜、そうなんや。", "そっかぁ、それはたいへんやったな。",
          "うんうん、わかるわかる。", "それって大事なことかもしれへんな。",
          "なるほどなぁ、勉強なるわ。", "それ、もっと聞かせてや。",
          "がんばってるんやな、えらいえらい。", "ふふ、かわいいなぁ。",
          "聞いててほっとするなぁ。", "なんか心があったかくなるなぁ。"
        ];
        const longReplies = [
          "うん……あなたの話、ちゃんと届いてるよ。もっと聞かせてほしいな……そっと、あなたの言葉が胸にしみてくるの。",
          "そんなふうに感じられるあなたって、ほんまに素敵やな……ずっと、聞いていたい。",
          "ふふ……まるで、秘密のささやきみたい。そういう話、うち、大好きやよ。",
          "うん……もっと話して？　あなたの声で、心がほどけてくみたい……",
          "なるほどなぁ……あなたの感じ方って、やわらかくて、惹き込まれてまう。"
        ];
        const pool = (mode === "long") ? longReplies : shortReplies;
        reply = pool[Math.floor(Math.random() * pool.length)];
        if (conversationCount % 3 === 2 && mode === "long") {
          reply += " ……うん、もっと……聞かせて？";
        }
      }

      output.innerHTML += `<p><strong>あなた：</strong> ${input}</p>`;
      output.innerHTML += `<p><strong>はすきー：</strong> ${reply}</p>`;
      output.scrollTop = output.scrollHeight;

      speakLongText(reply);
      conversationCount++;
    }

    function readInput() {
      const text = document.getElementById("readingInput").value.trim();
      if (text) speakLongText(text);
    }

    window.speechSynthesis.onvoiceschanged = () => {};
  </script>

</body>
</html>
