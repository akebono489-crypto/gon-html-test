<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>飲食店ホームページ サンプル一覧 | Esprit Artisan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f6f4f1;color:#2a2a2a}

.header{background:#1c1008;padding:40px 20px;text-align:center}
.header h1{font-family:'Noto Serif JP',serif;font-size:clamp(1.4rem,4vw,2rem);color:#fff;font-weight:700;margin-bottom:8px}
.header p{font-size:13px;color:rgba(255,255,255,.6)}

.main{max-width:900px;margin:0 auto;padding:40px 20px 60px}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:680px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:420px){.grid{grid-template-columns:1fr}}

.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.card img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block}
.card-body{padding:14px 16px 16px;text-align:center}
.card-name{font-size:.9rem;font-weight:700;margin-bottom:4px}
.card-sub{font-size:11px;color:#888;margin-bottom:12px}
.btn{display:inline-block;background:#2a2a2a;color:#fff;font-size:13px;font-weight:700;padding:9px 24px;border-radius:6px;text-decoration:none;letter-spacing:.06em;transition:background .2s}
.btn:hover{background:#555}

footer{background:#1a1a1a;color:#666;font-size:11px;text-align:center;padding:18px;letter-spacing:.08em}
footer a{color:#888;text-decoration:none}
</style>
</head>
<body>

<div class="header">
  <h1>飲食店ホームページ サンプル一覧</h1>
  <p>クリックして各サンプルをご覧ください</p>
</div>

<main class="main">
  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?q=70&w=800&auto=format&fit=crop" alt="和食テンプレート">
      <div class="card-body">
        <p class="card-name">和食・日本料理</p>
        <p class="card-sub">黒・金　高級感</p>
        <a class="btn" href="washoku.html" target="_blank">サンプルを見る</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?q=70&w=800&auto=format&fit=crop" alt="カフェテンプレート">
      <div class="card-body">
        <p class="card-name">カフェ・洋食</p>
        <p class="card-sub">白・ベージュ　ナチュラル</p>
        <a class="btn" href="cafe.html" target="_blank">サンプルを見る</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1557872943-16a5ac26437e?q=70&w=800&auto=format&fit=crop" alt="居酒屋テンプレート">
      <div class="card-body">
        <p class="card-name">居酒屋・ラーメン</p>
        <p class="card-sub">赤・黒　力強さ</p>
        <a class="btn" href="izakaya.html" target="_blank">サンプルを見る</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=70&w=800&auto=format&fit=crop" alt="ファミリーレストランテンプレート">
      <div class="card-body">
        <p class="card-name">ファミリーレストラン</p>
        <p class="card-sub">オレンジ・緑　明るい</p>
        <a class="btn" href="family.html" target="_blank">サンプルを見る</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=70&w=800&auto=format&fit=crop" alt="フレンチテンプレート">
      <div class="card-body">
        <p class="card-name">フレンチ・イタリアン</p>
        <p class="card-sub">白・深緑　上品</p>
        <a class="btn" href="french.html" target="_blank">サンプルを見る</a>
      </div>
    </div>

  </div>
</main>

<footer>© 2025 Esprit Artisan — <a href="../index.html">トップへ戻る</a></footer>
</body>
</html>
